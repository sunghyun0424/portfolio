<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Fapis 패피스 — 명품 수선 중개 플랫폼 프로젝트" />
  <title>Fapis | 패피스</title>
  <link rel="stylesheet" href="/css/portfolio.css" />
</head>
<body class="pappys-solo">
  <h1 class="visually-hidden">Fapis | 패피스</h1>

  <main class="pappys-window pappys-window--solo">
    <div class="finder finder--light" role="application" aria-label="Finder">
      <div class="finder__traffic-cell">
        <div class="finder__traffic">
          <a class="finder__dot finder__dot--close" href="../index.html" title="메인 페이지" aria-label="메인 페이지로 이동"></a>
          <span class="finder__dot finder__dot--min" aria-hidden="true"></span>
          <span class="finder__dot finder__dot--zoom" aria-hidden="true"></span>
        </div>
      </div>

      <header class="finder__toolbar" aria-label="도구 막대">
        <div class="finder__toolbar-left">
          <div class="finder__nav">
            <button type="button" class="finder__nav-btn" disabled aria-label="뒤로">
              <svg width="9" height="14" viewBox="0 0 9 14" fill="none" aria-hidden="true"><path d="M7 1L2 7l5 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button type="button" class="finder__nav-btn" disabled aria-label="앞으로">
              <svg width="9" height="14" viewBox="0 0 9 14" fill="none" aria-hidden="true"><path d="M2 1l5 6-5 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
          <h2 class="finder__toolbar-title">프로젝트</h2>
        </div>
        <div class="finder__toolbar-mid">
          <div class="finder__view-modes" role="toolbar" aria-label="보기 방식">
            <button type="button" class="finder__seg finder__seg--on" aria-pressed="true" aria-label="아이콘 보기" title="아이콘">
              <svg width="17" height="17" viewBox="0 0 17 17" fill="currentColor" aria-hidden="true"><rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1"/><rect x="10" y="1.5" width="5.5" height="5.5" rx="1"/><rect x="1.5" y="10" width="5.5" height="5.5" rx="1"/><rect x="10" y="10" width="5.5" height="5.5" rx="1"/></svg>
            </button>
            <button type="button" class="finder__seg" aria-pressed="false" aria-label="목록" title="목록">
              <svg width="17" height="17" viewBox="0 0 17 17" fill="none" aria-hidden="true"><path d="M2 3.5h13M2 8.5h13M2 13.5h13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </button>
            <button type="button" class="finder__seg" aria-pressed="false" aria-label="컬럼" title="컬럼">
              <svg width="17" height="17" viewBox="0 0 17 17" fill="none" aria-hidden="true"><rect x="2" y="2" width="4" height="13" rx="0.8" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="2" width="3.5" height="13" rx="0.8" stroke="currentColor" stroke-width="1.3"/><rect x="13" y="2" width="2" height="13" rx="0.8" stroke="currentColor" stroke-width="1.3"/></svg>
            </button>
            <button type="button" class="finder__seg" aria-pressed="false" aria-label="갤러리" title="갤러리">
              <svg width="17" height="17" viewBox="0 0 17 17" fill="none" aria-hidden="true"><rect x="2" y="3" width="13" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/><circle cx="6" cy="7.5" r="2" stroke="currentColor" stroke-width="1.2"/><path d="M2 12l3.5-3 2.5 2.5L14 8v6H2v-2z" fill="currentColor" opacity="0.35"/></svg>
            </button>
          </div>
        </div>
        <div class="finder__toolbar-right" aria-label="도구">
          <button type="button" class="finder__tool-btn" aria-label="작업 더보기" title="더보기">
            <svg width="17" height="17" viewBox="0 0 17 17" fill="currentColor" aria-hidden="true"><circle cx="4" cy="8.5" r="1.3"/><circle cx="8.5" cy="8.5" r="1.3"/><circle cx="13" cy="8.5" r="1.3"/></svg>
          </button>
          <button type="button" class="finder__tool-btn finder__tool-btn--search" aria-label="검색" title="검색">
            <svg width="17" height="17" viewBox="0 0 17 17" fill="none" aria-hidden="true"><circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M10.2 10.2L14.5 14.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </button>
        </div>
      </header>

      <aside class="finder__sidebar" aria-label="사이드바">
        <nav class="finder__side-scroll">
          <p class="finder__side-heading">방문자용</p>
          <ul class="finder__side-list">
            <li>
              <a class="finder__row" href="../index.html" aria-label="포트폴리오 메인 페이지로 이동">
                <span class="finder__ico finder__ico--desk" aria-hidden="true"></span>
                Main Page
              </a>
            </li>
            <li>
              <button type="button" class="finder__row finder__row--contacts" data-copy-clipboard="chltjdgus424@gmail.com" data-copy-toast="메일 주소가 복사되었어요!" aria-label="chltjdgus424@gmail.com 복사">
                <span class="finder__ico finder__ico--mail" aria-hidden="true"></span>
                <span class="finder__row-col">
                  <span class="finder__row-kicker">e-mail</span>
                  <span class="finder__row-value">chltjdgus424@gmail.com</span>
                </span>
              </button>
            </li>
            <li>
              <button type="button" class="finder__row finder__row--contacts" data-copy-clipboard="010-2050-0424" data-copy-toast="전화번호가 복사되었어요!" aria-label="010-2050-0424 복사">
                <span class="finder__ico finder__ico--phone" aria-hidden="true"></span>
                <span class="finder__row-col">
                  <span class="finder__row-kicker">Phone</span>
                  <span class="finder__row-value">010-2050-0424</span>
                </span>
              </button>
            </li>
          </ul>
          <p class="finder__side-heading">회사</p>
          <ul class="finder__side-list">
            <li>
              <span class="finder__row finder__row--selected">
                <img class="finder__ico-img finder__ico-img--brand" src="/assets/Fapis.svg" width="16" height="16" alt="" decoding="async" />
                Fapis
              </span>
            </li>
            <li>
              <a class="finder__row" href="miso.html" aria-label="MISO 미소로 이동">
                <img class="finder__ico-img finder__ico-img--brand" src="/assets/MISO.svg" width="16" height="16" alt="" decoding="async" />
                MISO
              </a>
            </li>
          </ul>
        </nav>
      </aside>

      <div class="finder__stage" aria-label="프로젝트 항목">
        <div class="finder__icon-grid">
          <a class="finder__item" href="pappys-offplatform.html">
            <span class="finder__folder-ic" aria-hidden="true">
              <img src="/assets/macos-folder-original.svg" alt="" width="88" height="88" decoding="async" />
            </span>
            <span class="finder__item-name">사거래 방지 기획</span>
          </a>
          <a class="finder__item" href="pappys-estimate-split.html">
            <span class="finder__folder-ic" aria-hidden="true">
              <img src="/assets/macos-folder-original.svg" alt="" width="88" height="88" decoding="async" />
            </span>
            <span class="finder__item-name">견적가 분리 기획</span>
          </a>
          <a class="finder__item" href="pappys-estimate-filter.html">
            <span class="finder__folder-ic" aria-hidden="true">
              <img src="/assets/macos-folder-original.svg" alt="" width="88" height="88" decoding="async" />
            </span>
            <span class="finder__item-name">견적 필터링 기획</span>
          </a>
        </div>
      </div>
    </div>
  </main>
  <div class="finder__toast" id="portfolio-toast" role="status" aria-live="polite"></div>
  <script src="/js/finder-sidebar.js"></script>
</body>
</html>
