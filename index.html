<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="최성현 · 서비스 운영·기획 포트폴리오" />
  <title>최성현 · Portfolio</title>
  <link rel="stylesheet" href="css/portfolio.css" />
</head>
<body class="landing-page">
  <div class="landing-bg" aria-hidden="true"></div>

  <main class="landing">
    <header class="landing-header">
      <h1 class="landing-name">최성현</h1>
      <p class="landing-tag">서비스 운영 · 기획</p>
    </header>

    <div class="landing-dock">
      <a class="dock-folder dock-folder--fapis" href="work/pappys.html" aria-label="Fapis 패피스 — 명품 수선 중개 플랫폼, 23.11 ~ 24.08">
        <img
          class="dock-folder__icon dock-folder__icon--fapis"
          src="assets/Fapis.svg"
          width="1198"
          height="1022"
          alt=""
          role="presentation"
          decoding="async"
        />
        <span class="dock-folder__caption" aria-hidden="true">
          <span class="dock-folder__caption-line dock-folder__caption-line--name">Fapis | 패피스</span>
          <span class="dock-folder__caption-line dock-folder__caption-line--desc">명품 수선 중개 플랫폼</span>
          <span class="dock-folder__caption-line dock-folder__caption-line--meta">23.11 ~ 24.08</span>
        </span>
      </a>
      <a
        id="miso"
        class="dock-folder dock-folder--miso"
        href="work/miso.html"
        aria-label="MISO 미소 — 이사 중개 플랫폼, 24.12 ~ 현재, 프로젝트 폴더 열기"
      >
        <img
          class="dock-folder__icon dock-folder__icon--miso"
          src="assets/MISO.svg"
          width="1198"
          height="1022"
          alt=""
          role="presentation"
          decoding="async"
        />
        <span class="dock-folder__caption" aria-hidden="true">
          <span class="dock-folder__caption-line dock-folder__caption-line--name">MISO | 미소</span>
          <span class="dock-folder__caption-line dock-folder__caption-line--desc">이사 중개 플랫폼</span>
          <span class="dock-folder__caption-line dock-folder__caption-line--meta">24.12 ~ 현재</span>
        </span>
      </a>
    </div>

    <footer class="landing-foot">
      <button
        type="button"
        class="landing-mail"
        data-copy-clipboard="chltjdgus424@gmail.com"
        data-copy-toast="메일 주소가 복사되었어요!"
        aria-label="이메일 주소 복사"
      >
        chltjdgus424@gmail.com
      </button>
      <button
        type="button"
        class="landing-tel"
        data-copy-clipboard="010-2050-0424"
        data-copy-toast="전화번호가 복사되었어요!"
        aria-label="전화번호 복사"
      >
        010-2050-0424
      </button>
    </footer>
  </main>
  <div class="finder__toast" id="portfolio-toast" role="status" aria-live="polite"></div>
  <script src="js/finder-sidebar.js"></script>
</body>
</html>
